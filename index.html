<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>The Second Earth</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div id="page">

    <div id="topArea">

        <div id="buttons">

            <button class="square green" id="btn1"></button>
            <button class="square greenblue" id="btn2"></button>
            <button class="square blue" id="btn3"></button>
            <button class="square blue" id="btn4"></button>
            <button class="square blue" id="btn5"></button>

            <button class="square green" id="btn6"></button>
            <button class="square greenblue" id="btn7"></button>
            <button class="square blue" id="btn8"></button>
            <button class="square blue" id="btn9"></button>
            <button class="square blue" id="btn10"></button>

        </div>

        <div id="lineContainer">

            <div id="leftLine"></div>

            <div id="rightLine"></div>

        </div>

    </div>



    <div id="answerArea">

        <div id="leftCircle" class="circle">

            <span id="leftEmoji"></span>

        </div>

        <div id="textHa">

            は

        </div>

        <div id="rightCircle" class="circle">

            <span id="rightEmoji"></span>

        </div>

        <div id="textSuru">

            する器官

        </div>

    </div>

</div>



<div id="clearScreen">

    <div id="clearInner">

        <img
            id="clearImage"
            src="W CLEAR.jpg"
            alt="CLEAR">

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
